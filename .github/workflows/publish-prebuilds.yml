name: Publish prebuilds

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            package: "@apexmarkdown/apex-darwin-arm64"
            artifact: apexmarkdown-apex-darwin-arm64
          - os: macos-15-intel
            package: "@apexmarkdown/apex-darwin-x64"
            artifact: apexmarkdown-apex-darwin-x64
          - os: ubuntu-24.04
            package: "@apexmarkdown/apex-linux-x64"
            artifact: apexmarkdown-apex-linux-x64
          - os: ubuntu-24.04-arm
            package: "@apexmarkdown/apex-linux-arm64"
            artifact: apexmarkdown-apex-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build native addon
        run: npm run build

      - name: Test
        run: npm test

      - name: Package prebuild
        run: npm run package:prebuild

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: prebuilds
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-24.04
    # Trusted publishing: npm authenticates this workflow via GitHub OIDC.
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm 11.5.1 or newer.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v7
        with:
          path: downloaded-prebuilds

      - name: Assemble prebuilds directory
        run: |
          mkdir -p prebuilds
          for dir in downloaded-prebuilds/*/; do
            cp -R "${dir}." prebuilds/
          done
          find prebuilds -maxdepth 3 -type f -o -type d

      - name: Publish platform packages
        run: |
          for dir in prebuilds/@apexmarkdown/*/; do
            echo "Publishing $dir"
            npm publish "$dir" --access public
          done

      - name: Publish root package
        run: npm publish --access public
