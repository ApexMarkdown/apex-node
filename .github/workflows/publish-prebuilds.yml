name: Publish prebuilds

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            package: "@apexmarkdown/apex-darwin-arm64"
            artifact: apexmarkdown-apex-darwin-arm64
          - os: macos-13
            package: "@apexmarkdown/apex-darwin-x64"
            artifact: apexmarkdown-apex-darwin-x64
          - os: ubuntu-24.04
            package: "@apexmarkdown/apex-linux-x64"
            artifact: apexmarkdown-apex-linux-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build

      - name: Test
        run: npm test

      - name: Package prebuild
        run: npm run package:prebuild

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: prebuilds/**
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-prebuilds

      - name: Assemble prebuilds directory
        run: |
          mkdir -p prebuilds
          for dir in downloaded-prebuilds/*/; do
            cp -R "$dir"prebuilds/. prebuilds/
          done
          find prebuilds -maxdepth 2 -type d

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in prebuilds/@apexmarkdown/*/; do
            echo "Publishing $dir"
            npm publish "$dir" --access public
          done

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
