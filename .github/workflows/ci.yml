name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            package: "@apexmarkdown/apex-darwin-arm64"
            artifact: apexmarkdown-apex-darwin-arm64
          - os: macos-15-intel
            package: "@apexmarkdown/apex-darwin-x64"
            artifact: apexmarkdown-apex-darwin-x64
          - os: ubuntu-24.04
            package: "@apexmarkdown/apex-linux-x64"
            artifact: apexmarkdown-apex-linux-x64
          - os: ubuntu-24.04-arm
            package: "@apexmarkdown/apex-linux-arm64"
            artifact: apexmarkdown-apex-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build native addon
        run: npm run build

      - name: Test
        run: npm test

      - name: Package prebuild
        run: npm run package:prebuild

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: prebuilds
          if-no-files-found: error
